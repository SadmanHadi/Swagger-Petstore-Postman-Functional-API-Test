name: API Automation Framework Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.BASE_URL || 'https://petstore.swagger.io' }}
      API_KEY: ${{ secrets.API_KEY }}
      POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
      COLLECTION_UID: ${{ secrets.COLLECTION_UID }}
      ENVIRONMENT_UID: ${{ secrets.ENVIRONMENT_UID }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Dependencies
        run: pnpm install

      - name: Create Reports Directory
        run: mkdir -p reports/postman

      - name: Run Framework Tests
        run: pnpm test

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postman-reports
          path: reports/postman/
